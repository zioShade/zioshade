name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.15.2
        uses: mlugg/setup-zig@v1
        with:
          version: 0.15.2

      - name: zig version
        run: zig version

      - name: Build (library + CLI)
        run: |
          zig build
          zig build cli

      - name: Build examples
        run: zig build examples

      - name: Unit tests
        run: zig build test --summary all

      - name: HLSL backend tests
        run: zig build test-hlsl --summary all

  conformance:
    name: spirv-val conformance (${{ matrix.os }})
    needs: build-test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.15.2
        uses: mlugg/setup-zig@v1
        with:
          version: 0.15.2

      - name: Install Vulkan SDK (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt-get update
          sudo apt-get install -y vulkan-sdk

      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.341.1
          cache: true

      - name: Verify spirv-val on PATH
        shell: bash
        run: spirv-val --version

      - name: Run conformance suite
        run: zig build conformance --summary all

  fuzz-smoke:
    name: fuzz smoke (5k iterations)
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v1
        with:
          version: 0.15.2
      - name: Quick fuzz pass
        run: zig build fuzz -- --count 5000

  # Smoke-tests the public C ABI surface across all three OSes by building the
  # static + shared libraries and running the C consumer example end-to-end.
  # Kept separate from build-test so a C-side regression doesn't mask Zig test
  # failures (and vice versa).
  c-abi:
    name: C ABI smoke
    needs: build-test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v1
        with:
          version: 0.15.2
      - name: Build C ABI library and example
        run: |
          zig build c-lib --summary all
          zig build c-example --summary all
      - name: Run C consumer
        run: zig build run-c-example
