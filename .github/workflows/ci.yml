name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref (a new push to a PR obsoletes the
# in-flight run). main pushes are keyed by SHA so they never cancel each other.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: zig fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.15.2
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          use-cache: true

      - name: zig fmt --check
        run: zig fmt --check src

  build-test:
    name: build & test (${{ matrix.os }}, zig ${{ matrix.zig }})
    strategy:
      fail-fast: false
      matrix:
        # macOS is pinned to macos-13, not macos-latest: Zig 0.15.2 cannot link
        # libSystem against the macOS 15/26 SDKs the newer runner images ship
        # (every libc symbol comes back undefined, led by
        # __availability_version_check, and those images carry no older SDK to
        # fall back to). macos-13 ships the macOS 13/14 SDK Zig 0.15.2 links
        # cleanly. Revisit when the Zig floor moves past 0.15.2.
        os: [ubuntu-latest, macos-13, windows-latest]
        # Supported floor and tested window. 0.15.2 is the hard floor and is
        # required on every OS. Newer Zig versions are added here as they ship;
        # keep the last three releases and drop the oldest per the README policy.
        zig: ["0.15.2"]
        include:
          # 0.16 is a required check: the library, CLI, C ABI, and full test
          # suite build and pass on it (the std.Io / process-API divergence is
          # centralized in src/compat.zig). Linux for now; broaden to macOS and
          # Windows once observed green. The only 0.16 holdout is the standalone
          # dev tools under tools/ (not built by these steps), tracked in #424.
          - os: ubuntu-latest
            zig: "0.16.0"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Install the oracle validators so the differential tests (wgsl_tests via
      # glslang, correctness_tests via spirv-val) actually run instead of taking
      # their tool-absent SkipZigTest path. Linux only: apt has both; the other
      # OSes keep skipping (spirv-val is covered separately by the conformance
      # job) so we avoid the heavier per-OS SDK installs here.
      - name: Install oracle validators (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y glslang-tools spirv-tools

      - name: Install Zig ${{ matrix.zig }}
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ matrix.zig }}
          use-cache: true

      - name: zig version
        run: zig version

      - name: Build (library + CLI)
        run: |
          zig build
          zig build cli

      - name: Build examples
        run: zig build examples

      - name: Unit tests
        run: zig build test --summary all

      - name: HLSL backend tests
        run: zig build test-hlsl --summary all

  conformance:
    name: spirv-val conformance (${{ matrix.os }})
    needs: build-test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.15.2
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          use-cache: true

      # spirv-val is all the conformance suite needs. The distro spirv-tools
      # package ships it, so we skip the full LunarG Vulkan SDK (whose apt repo
      # is only published for older Ubuntu codenames and 404s on newer runners).
      - name: Install spirv-tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y spirv-tools

      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.341.1
          cache: true

      - name: Verify spirv-val on PATH
        shell: bash
        run: spirv-val --version

      - name: Run conformance suite
        run: zig build conformance --summary all

  fuzz-smoke:
    name: fuzz smoke (5k iterations)
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          use-cache: true
      - name: Quick fuzz pass
        run: zig build fuzz -- --count 5000

  # Smoke-tests the public C ABI surface across all three OSes by building the
  # static + shared libraries and running the C consumer example end-to-end.
  # Kept separate from build-test so a C-side regression doesn't mask Zig test
  # failures (and vice versa).
  c-abi:
    name: C ABI smoke
    needs: build-test
    strategy:
      fail-fast: false
      matrix:
        # macos-13 for the same reason as build-test: Zig 0.15.2 links libSystem
        # only against the older SDK that image ships.
        os: [ubuntu-latest, macos-13, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          use-cache: true
      - name: Build C ABI library and example
        run: |
          zig build c-lib --summary all
          zig build c-example --summary all
      - name: Run C consumer
        run: zig build run-c-example
