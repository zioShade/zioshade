<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>zioshade playground</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --border: #262b36;
      --text: #d6dae2;
      --muted: #8b93a2;
      --accent: #7aa2f7;
      --error: #f7768e;
      --ok: #9ece6a;
      --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 12px;
    }
    header h1 { font-size: 15px; margin: 0; font-weight: 600; }
    header .sub { color: var(--muted); font-size: 12px; }
    header .status { margin-left: auto; font-size: 12px; color: var(--muted); }
    header .status.ok { color: var(--ok); }
    header .status.err { color: var(--error); }
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      min-height: 0;
    }
    .pane {
      background: var(--panel);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .pane-head {
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    textarea {
      flex: 1;
      resize: none;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.5;
      padding: 14px;
      tab-size: 2;
    }
    .tabs { display: flex; gap: 4px; }
    .tab {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font: inherit;
      font-size: 12px;
      padding: 3px 12px;
      border-radius: 5px;
      cursor: pointer;
    }
    .tab.active { color: var(--text); border-color: var(--accent); background: rgba(122,162,247,0.12); }
    pre.output {
      flex: 1;
      margin: 0;
      overflow: auto;
      padding: 14px;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.5;
      white-space: pre;
    }
    pre.output.error { color: var(--error); }
    .toolbar {
      padding: 8px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    button.run {
      background: var(--accent);
      border: 0;
      color: #0f1115;
      font: inherit;
      font-weight: 600;
      font-size: 13px;
      padding: 6px 16px;
      border-radius: 6px;
      cursor: pointer;
    }
    label.auto { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  </style>
</head>
<body>
  <header>
    <h1>zioshade playground</h1>
    <span class="sub">GLSL fragment shader &rarr; HLSL / MSL / GLSL / WGSL</span>
    <span class="status" id="status">loading wasm&hellip;</span>
  </header>
  <main>
    <section class="pane">
      <div class="pane-head">GLSL source (fragment)</div>
      <textarea id="source" spellcheck="false"></textarea>
      <div class="toolbar">
        <button class="run" id="run">Compile</button>
        <label class="auto"><input type="checkbox" id="auto" checked> compile on edit</label>
      </div>
    </section>
    <section class="pane">
      <div class="pane-head">
        <div class="tabs" id="tabs"></div>
      </div>
      <pre class="output" id="output">Compile to see output.</pre>
    </section>
  </main>
  <script src="playground.js"></script>
</body>
</html>
